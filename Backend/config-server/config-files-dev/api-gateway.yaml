spring:
  application:
    name: api-gateway

  codec:
    max-in-memory-size: 20MB
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/order/**

        - id: restaurant-service
          uri: lb://restaurant-service
          predicates:
            - Path=/api/v1/restaurant/**
            - Path=/api/v1/menu/**


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/



